name: BTNSIM CI/CD

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

jobs:

  build-test-package:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build -t btnsim-ci .

      - name: Run static analysis
        run: |
          docker run --rm btnsim-ci make analyze

      - name: Run unit tests
        run: |
          docker run --rm btnsim-ci make run-tests

      - name: Build Windows executable
        run: |
          docker run --rm \
            -v ${{ github.workspace }}/build:/app/build \
            btnsim-ci \
            make win-build

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: btnsim-windows
          path: build/btnsim.exe