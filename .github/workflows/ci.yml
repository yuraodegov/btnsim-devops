name: BTNSIM CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:

  # ── 1. Static analysis ─────────────────────────────────────────────────
  analyze:
    name: Static Analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image (cached)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          load: true
          tags: btnsim-ci:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run cppcheck
        run: docker run --rm btnsim-ci make analyze

  # ── 2. Unit tests (Linux) ──────────────────────────────────────────────
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: analyze
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image (cached)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          load: true
          tags: btnsim-ci:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run unit tests
        run: docker run --rm btnsim-ci make run-tests

  # ── 3. Build Windows .exe ──────────────────────────────────────────────
  build-windows:
    name: Build Windows Executable
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image (cached)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          load: true
          tags: btnsim-ci:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Compile btnsim.exe
        run: |
          docker run --rm \
            -v ${{ github.workspace }}/build:/app/build \
            btnsim-ci \
            make win-build

      - name: Upload exe for GUI tests
        uses: actions/upload-artifact@v4
        with:
          name: btnsim-exe-${{ github.sha }}
          path: build/btnsim.exe
          retention-days: 1

  # ── 4. GUI tests (Windows) ─────────────────────────────────────────────
  gui-test:
    name: GUI Tests (Windows)
    runs-on: windows-latest
    needs: build-windows
    steps:
      - uses: actions/checkout@v4

      - name: Download btnsim.exe
        uses: actions/download-artifact@v4
        with:
          name: btnsim-exe-${{ github.sha }}
          path: build

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r gui_tests/requirements.txt

      - name: Run GUI tests
        run: pytest gui_tests/test_gui.py -v --tb=short

      - name: Upload final artifact
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: btnsim-windows-${{ github.sha }}
          path: build/btnsim.exe
          retention-days: 30